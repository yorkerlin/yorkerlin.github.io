<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ page.title }} | {{ site.title }}</title>
  <link rel="stylesheet" href="{{ '/css/style.css' | relative_url }}">
</head>
<body>
<div class="container">
  <nav class="site-nav">
    <span class="site-name">{{ site.title }}</span>
    <span class="nav-links">
      <a href="{{ '/' | relative_url }}">Home</a>
      <a href="{{ '/research.html' | relative_url }}">Papers</a>
      <a href="{{ '/year-archive.html' | relative_url }}">Blog Posts</a>
    </span>
  </nav>
  <hr class="nav-rule">
  <div class="main-content">
    <h1>{{ page.title }}</h1>
    <p class="post-date">{{ page.date | date: "%B %d, %Y" }}</p>
    {{ content }}
  </div>
</div>

<script>
  // Unwrap ALL math from <code> tags before MathJax loads
  document.querySelectorAll('code').forEach(function(el) {
    var text = el.textContent;
    if (/\$/.test(text)) {
      // Use a temp element to safely HTML-encode the text
      var temp = document.createElement('span');
      temp.textContent = text;
      el.outerHTML = temp.innerHTML;
    }
  });

  window.MathJax = {
    tex: {
      inlineMath: [['$', '$'], ['\\(', '\\)']],
      displayMath: [['$$', '$$'], ['\\[', '\\]']],
      processEscapes: true,
      tags: 'ams'
    }
  };

  var script = document.createElement('script');
  script.src = 'https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js';
  document.head.appendChild(script);
</script>
</body>
</html>
